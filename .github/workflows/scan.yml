name: Monthly Scan

on:
  schedule:
    - cron: '0 8 1 * *'  # 1st of month, 8am UTC
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Grype filesystem scan
        uses: anchore/scan-action@ba2e18e34737763b9c92004dfe2afbcbd2d6207d
        with:
          path: "."
          fail-build: true
          severity-cutoff: high
          only-fixed: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        if: always()
        with:
          sarif_file: results.sarif
